<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AsyncTank Katamari BOT</title>
    <link rel="stylesheet" href="style.css?v=20260703-rapier2">
  </head>
  <body>
    <main class="game-shell">
      <section id="scene" class="scene" aria-label="3D battle scene"></section>

      <header class="hud">
        <div class="brand">
          <p>ASYNC TANK</p>
          <h1>Katamari BOT</h1>
        </div>
        <div class="meters" aria-label="battle meters">
          <div class="meter blue"><span id="playerHp"></span></div>
          <strong id="clock">0.0</strong>
          <div class="meter red"><span id="enemyHp"></span></div>
        </div>
        <div class="actions">
          <button id="battleBtn" type="button">BATTLE</button>
          <button id="resetBtn" type="button">RESET</button>
        </div>
      </header>

      <aside class="builder">
        <div class="builder-top">
          <div>
            <p class="label">BOT</p>
            <h2 id="botName">Mono Core</h2>
          </div>
          <div class="status-pill" id="battleState">READY</div>
        </div>

        <div class="body-map" id="bodyMap" aria-label="part mounts">
          <div class="body-core">CORE</div>
        </div>

        <div class="palette" id="palette" aria-label="part palette"></div>

        <div class="preset-row" id="presets" aria-label="bot presets"></div>

        <div class="enemy-row">
          <label for="enemySelect">ENEMY</label>
          <select id="enemySelect"></select>
        </div>

        <div class="code-row">
          <button id="exportBtn" type="button">CODE</button>
          <button id="importBtn" type="button">LOAD</button>
        </div>
        <textarea id="codeBox" spellcheck="false" aria-label="bot code"></textarea>
      </aside>
    </main>

    <script src="app.js?v=20260703-rapier2"></script>
  </body>
</html>
