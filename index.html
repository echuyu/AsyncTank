<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AsyncFortress 3D Clash</title>
    <link rel="stylesheet" href="style.css?v=20260704-fortress1">
  </head>
  <body>
    <main class="game-shell">
      <section id="scene" class="scene" aria-label="3D fortress battle scene"></section>

      <header class="hud">
        <div class="brand">
          <p>ASYNC FORTRESS</p>
          <h1>3D Clash</h1>
        </div>
        <div class="meters" aria-label="fortress core meters">
          <div class="meter blue"><span id="playerCore"></span></div>
          <strong id="clock">0.0</strong>
          <div class="meter red"><span id="rivalCore"></span></div>
        </div>
        <div class="actions">
          <button id="fightBtn" type="button">FIGHT</button>
          <button id="resetBtn" type="button">RESET</button>
        </div>
      </header>

      <aside class="builder">
        <div class="builder-top">
          <div>
            <p class="label">FORTRESS</p>
            <h2 id="fortressName">Frontline Box</h2>
          </div>
          <div class="status-pill" id="battleState">READY</div>
        </div>

        <div class="result-line" id="resultLine">CORE 0 / 0</div>

        <div class="selection-readout" id="selectionReadout" aria-live="polite"></div>

        <div class="workbench">
          <div class="fortress-grid" id="fortressGrid" aria-label="fortress grid"></div>
          <div class="builder-telemetry" id="builderTelemetry" aria-label="fortress telemetry"></div>
        </div>

        <div class="palette" id="palette" aria-label="part palette"></div>

        <div class="preset-row" id="presets" aria-label="fortress presets"></div>

        <div class="enemy-row">
          <label for="rivalSelect">RIVAL</label>
          <select id="rivalSelect"></select>
        </div>

        <div class="code-row">
          <button id="exportBtn" type="button">CODE</button>
          <button id="importBtn" type="button">LOAD</button>
        </div>
        <textarea id="codeBox" spellcheck="false" aria-label="fortress code"></textarea>
      </aside>
    </main>

    <script src="app.js?v=20260704-fortress1"></script>
  </body>
</html>
